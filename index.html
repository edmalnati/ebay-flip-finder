<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>eBay Flip Finder</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f;
    --bg-card: #1a1a1a;
    --bg-cell: #222222;
    --border: #2e2e2e;
    --border-strong: #404040;
    --text-primary: #f0f0ee;
    --text-secondary: #888884;
    --text-muted: #555552;
    --accent-great: #EF9F27;
    --accent-great-bg: #2a1f08;
    --accent-great-text: #FAC775;
    --accent-good: #639922;
    --accent-good-bg: #182208;
    --accent-good-text: #C0DD97;
    --accent-broken-bg: #2a0d0d;
    --accent-broken-text: #F09595;
    --accent-working-bg: #082218;
    --accent-working-text: #5DCAA5;
    --profit-great: #C0DD97;
    --profit-good: #97C459;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-sans: 'IBM Plex Sans', sans-serif;
    --radius: 6px;
    --radius-lg: 10px;
  }
  body { background: var(--bg); color: var(--text-primary); font-family: var(--font-sans); font-size: 14px; min-height: 100vh; }
  header { border-bottom: 1px solid var(--border); padding: 18px 28px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .logo { font-family: var(--font-mono); font-size: 15px; font-weight: 500; letter-spacing: -0.02em; }
  .logo span { color: var(--accent-great); }
  .refresh-info { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  main { max-width: 1200px; margin: 0 auto; padding: 28px 28px 60px; }

  .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .filter-btn { padding: 6px 14px; border: 1px solid var(--border-strong); border-radius: var(--radius); background: transparent; color: var(--text-secondary); font-family: var(--font-mono); font-size: 11px; cursor: pointer; transition: all 0.15s; letter-spacing: 0.04em; }
  .filter-btn:hover { border-color: var(--text-secondary); color: var(--text-primary); }
  .filter-btn.active { background: var(--text-primary); color: var(--bg); border-color: var(--text-primary); }

  .toggle-row { display: flex; align-items: center; gap: 10px; }
  .toggle-label { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); letter-spacing: 0.04em; }
  .toggle-switch { position: relative; width: 36px; height: 20px; cursor: pointer; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: var(--border-strong); border-radius: 20px; transition: 0.2s; }
  .toggle-slider:before { content: ''; position: absolute; height: 14px; width: 14px; left: 3px; bottom: 3px; background: var(--text-muted); border-radius: 50%; transition: 0.2s; }
  .toggle-switch input:checked + .toggle-slider { background: var(--accent-good); }
  .toggle-switch input:checked + .toggle-slider:before { transform: translateX(16px); background: white; }
  .toggle-active { color: var(--accent-good-text) !important; }

  .summary-bar { display: flex; gap: 20px; align-items: center; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .summary-total { font-family: var(--font-mono); font-size: 13px; color: var(--text-secondary); }
  .summary-stat { display: flex; align-items: center; gap: 7px; font-family: var(--font-mono); font-size: 12px; }

  .section-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 12px; margin-top: 28px; padding-left: 2px; }
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 12px; }

  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; border-left-width: 3px; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .card.great { border-left-color: var(--accent-great); }
  .card.good { border-left-color: var(--accent-good); }
  .card.fair { border-left-color: var(--border-strong); opacity: 0.6; }
  .card.unfair { border-left-color: #333; opacity: 0.4; }

  .card-top { display: flex; gap: 12px; margin-bottom: 12px; }
  .card-img { width: 52px; height: 52px; border-radius: var(--radius); object-fit: cover; background: var(--bg-cell); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 1px solid var(--border); }
  .card-meta { flex: 1; min-width: 0; }
  .card-category { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
  .card-title { font-size: 13px; font-weight: 500; color: var(--text-primary); line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  .badges { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .badge { font-family: var(--font-mono); font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 4px; letter-spacing: 0.05em; text-transform: uppercase; }
  .badge-great { background: var(--accent-great-bg); color: var(--accent-great-text); }
  .badge-good { background: var(--accent-good-bg); color: var(--accent-good-text); }
  .badge-fair { background: #1e1e1e; color: var(--text-secondary); }
  .badge-unfair { background: #1a1a1a; color: #444; }
  .badge-broken { background: var(--accent-broken-bg); color: var(--accent-broken-text); }
  .badge-working { background: var(--accent-working-bg); color: var(--accent-working-text); }

  .price-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; margin-bottom: 12px; }
  .price-cell { background: var(--bg-cell); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 9px; }
  .price-label { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .price-value { font-family: var(--font-mono); font-size: 14px; font-weight: 500; color: var(--text-primary); }
  .price-value.profit-great { color: var(--profit-great); }
  .price-value.profit-good { color: var(--profit-good); }
  .price-value.free { color: var(--accent-working-text); font-size: 12px; }

  .card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 10px; }
  .posted-date { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .view-btn { font-family: var(--font-mono); font-size: 11px; padding: 5px 12px; border: 1px solid var(--border-strong); border-radius: var(--radius); background: transparent; color: var(--text-secondary); cursor: pointer; text-decoration: none; transition: all 0.15s; display: inline-block; }
  .view-btn:hover { border-color: var(--text-secondary); color: var(--text-primary); background: var(--bg-cell); }

  .unfair-toggle { margin-top: 28px; border-top: 1px solid var(--border); padding-top: 16px; }
  .toggle-btn { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); background: none; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; gap: 8px; transition: color 0.15s; }
  .toggle-btn:hover { color: var(--text-secondary); }
  #unfair-section { display: none; margin-top: 16px; }
  #unfair-section.open { display: block; }
  .no-results { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); padding: 32px 0; text-align: center; }
</style>
</head>
<body>
<header>
  <div class="logo">ebay<span>flip</span>finder</div>
  <div class="refresh-info" id="refresh-time">loading...</div>
</header>
<main>
  <div class="controls">
    <div class="toolbar" id="model-filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="PS4 DualShock 4">PS4</button>
      <button class="filter-btn" data-filter="PS5 DualSense">PS5</button>
      <button class="filter-btn" data-filter="Xbox One/Series">Xbox One</button>
      <button class="filter-btn" data-filter="Xbox Series X/S">Xbox Series</button>
      <button class="filter-btn" data-filter="Joy-Con">Joy-Con</button>
    </div>
    <div class="toggle-row">
      <label class="toggle-switch">
        <input type="checkbox" id="working-only-toggle" />
        <span class="toggle-slider"></span>
      </label>
      <span class="toggle-label" id="working-only-label">Working only</span>
    </div>
  </div>

  <div class="summary-bar">
    <span class="summary-total" id="summary-total">— deals found</span>
    <span class="summary-stat"><span class="badge badge-great">GREAT</span><span id="count-great">—</span></span>
    <span class="summary-stat"><span class="badge badge-good">GOOD</span><span id="count-good">—</span></span>
    <span class="summary-stat" id="working-stat" style="display:none;"><span class="badge badge-working">WORKING</span><span id="count-working">—</span></span>
  </div>

  <div class="section-label">Great deals</div>
  <div class="cards-grid" id="great-cards"></div>
  <div class="section-label" id="good-label">Good deals</div>
  <div class="cards-grid" id="good-cards"></div>
  <div class="section-label" id="fair-label">Fair deals</div>
  <div class="cards-grid" id="fair-cards"></div>

  <div class="unfair-toggle" id="unfair-toggle">
    <button class="toggle-btn" onclick="toggleUnfair()">
      <span id="unfair-arrow">▶</span>
      <span id="unfair-label">Show unfair deals</span>
    </button>
    <div id="unfair-section">
      <div class="section-label" style="margin-top:16px;">Unfair — at or above market value</div>
      <div class="cards-grid" id="unfair-cards"></div>
    </div>
  </div>
</main>

<script>
  let allDeals = [];
  let activeFilter = 'all';
  let workingOnly = false;

  function formatDate(str) {
    if (!str) return '';
    const d = new Date(str);
    return 'Posted ' + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function profitClass(deal) {
    if (deal.deal_tier === 'great') return 'profit-great';
    if (deal.deal_tier === 'good') return 'profit-good';
    return '';
  }

  function buildCard(deal) {
    const tierBadge = {
      great: '<span class="badge badge-great">GREAT</span>',
      good:  '<span class="badge badge-good">GOOD</span>',
      fair:  '<span class="badge badge-fair">FAIR</span>',
      unfair:'<span class="badge badge-unfair">UNFAIR</span>',
    }[deal.deal_tier] || '';

    const statusBadge = deal.status === 'working'
      ? '<span class="badge badge-working">WORKING</span>'
      : '<span class="badge badge-broken">BROKEN</span>';

    const imgEl = deal.image_url
      ? `<img class="card-img" src="${deal.image_url}" alt="" onerror="this.outerHTML='<div class=\\'card-img\\'>🎮</div>'" />`
      : `<div class="card-img">🎮</div>`;

    const profit = deal.profit_estimate >= 0
      ? `+$${Number(deal.profit_estimate).toFixed(2)}`
      : `-$${Math.abs(Number(deal.profit_estimate)).toFixed(2)}`;

    const shipping = (!deal.shipping_price || deal.shipping_price === 0)
      ? `<span class="price-value free">Free</span>`
      : `<span class="price-value">$${Number(deal.shipping_price).toFixed(2)}</span>`;

    return `
      <div class="card ${deal.deal_tier}" data-model="${deal.model}" data-status="${deal.status}">
        <div class="card-top">
          ${imgEl}
          <div class="card-meta">
            <div class="card-category">${deal.model}</div>
            <div class="card-title">${deal.title}</div>
          </div>
        </div>
        <div class="badges">${tierBadge}${statusBadge}</div>
        <div class="price-row">
          <div class="price-cell"><div class="price-label">Buy price</div><div class="price-value">$${Number(deal.buy_price).toFixed(2)}</div></div>
          <div class="price-cell"><div class="price-label">Shipping</div>${shipping}</div>
          <div class="price-cell"><div class="price-label">Market</div><div class="price-value">$${Number(deal.market_price).toFixed(2)}</div></div>
          <div class="price-cell"><div class="price-label">Profit</div><div class="price-value ${profitClass(deal)}">${profit}</div></div>
        </div>
        <div class="card-footer">
          <span class="posted-date">${formatDate(deal.date_posted)}</span>
          <a class="view-btn" href="${deal.listing_url}" target="_blank" rel="noopener">View on eBay →</a>
        </div>
      </div>`;
  }

  function render() {
    let filtered = activeFilter === 'all'
      ? allDeals
      : allDeals.filter(d => d.model === activeFilter);

    if (workingOnly) filtered = filtered.filter(d => d.status === 'working');

    const great  = filtered.filter(d => d.deal_tier === 'great');
    const good   = filtered.filter(d => d.deal_tier === 'good');
    const fair   = filtered.filter(d => d.deal_tier === 'fair');
    const unfair = filtered.filter(d => d.deal_tier === 'unfair');
    const workingCount = filtered.filter(d => d.status === 'working').length;

    document.getElementById('great-cards').innerHTML  = great.length  ? great.map(buildCard).join('')  : '<p class="no-results">No great deals right now.</p>';
    document.getElementById('good-cards').innerHTML   = good.length   ? good.map(buildCard).join('')   : '<p class="no-results">No good deals right now.</p>';
    document.getElementById('fair-cards').innerHTML   = fair.length   ? fair.map(buildCard).join('')   : '';
    document.getElementById('unfair-cards').innerHTML = unfair.length ? unfair.map(buildCard).join('') : '';

    document.getElementById('summary-total').textContent = `${filtered.length} deals found`;
    document.getElementById('count-great').textContent = great.length;
    document.getElementById('count-good').textContent  = good.length;
    document.getElementById('count-working').textContent = workingCount;
    document.getElementById('working-stat').style.display = workingOnly ? 'flex' : 'none';
    document.getElementById('fair-label').style.display  = fair.length  ? '' : 'none';
    document.getElementById('unfair-toggle').style.display = unfair.length ? '' : 'none';
    document.getElementById('unfair-label').textContent = `Show ${unfair.length} unfair deal${unfair.length !== 1 ? 's' : ''}`;

    const label = document.getElementById('working-only-label');
    label.className = 'toggle-label' + (workingOnly ? ' toggle-active' : '');
    label.textContent = workingOnly ? 'Working only — ON' : 'Working only';
  }

  function toggleUnfair() {
    const sec = document.getElementById('unfair-section');
    const arrow = document.getElementById('unfair-arrow');
    arrow.textContent = sec.classList.toggle('open') ? '▼' : '▶';
  }

  document.getElementById('working-only-toggle').addEventListener('change', function() {
    workingOnly = this.checked;
    render();
  });

  document.getElementById('model-filters').addEventListener('click', function(e) {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });

  async function loadDeals() {
    try {
      const res = await fetch('data/deals.json?nocache=' + Date.now());
      const json = await res.json();
      allDeals = json.deals || json;
      const el = document.getElementById('refresh-time');
      if (json.last_updated) {
        const d = new Date(json.last_updated);
        el.textContent = 'Refreshed ' + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' at ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      } else {
        el.textContent = 'Sample data';
      }
      render();
    } catch (e) {
      document.getElementById('refresh-time').textContent = 'Could not load deals';
      console.error(e);
    }
  }

  loadDeals();
</script>
</body>
</html>
