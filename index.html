<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eBay Flip Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:            #0b0b0d;
      --surface:       #121215;
      --surface-2:     #1a1a1e;
      --surface-3:     #222228;
      --border:        #252529;
      --border-2:      #363640;
      --text:          #e2e2ec;
      --text-muted:    #72728a;
      --text-dim:      #3a3a48;

      --accent:        #f0b429;

      --great:         #ffd700;
      --great-bg:      rgba(255,215,0,0.07);
      --great-border:  rgba(255,215,0,0.22);
      --great-glow:    rgba(255,215,0,0.08);

      --good:          #22c55e;
      --good-bg:       rgba(34,197,94,0.07);
      --good-border:   rgba(34,197,94,0.22);

      --fair:          #888899;
      --fair-border:   rgba(136,136,153,0.18);

      --unfair:        #f05050;
      --unfair-bg:     rgba(240,80,80,0.06);
      --unfair-border: rgba(240,80,80,0.22);

      --broken:        #f59e0b;
      --working:       #10b981;

      --profit-pos:    #22c55e;
      --profit-neg:    #f05050;

      --gap:     1rem;
      --gap-sm:  0.5rem;
      --r:       2px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────── */
    .site-header {
      background: var(--surface);
      border-bottom: 2px solid var(--border-2);
      padding: 0.85rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .site-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      white-space: nowrap;
    }

    .site-title .slash {
      color: var(--text-muted);
      font-weight: 400;
    }

    .last-refreshed {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .last-refreshed strong {
      color: var(--text);
    }

    /* ── Main layout ─────────────────────────────────────────── */
    .main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 1.25rem 1.5rem 3rem;
    }

    /* ── Filter bar ──────────────────────────────────────────── */
    .filter-bar {
      display: flex;
      gap: var(--gap-sm);
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.4rem 1rem;
      cursor: pointer;
      border-radius: var(--r);
      transition: border-color 0.12s, color 0.12s, background 0.12s;
    }

    .filter-btn:hover {
      border-color: var(--border-2);
      color: var(--text);
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    /* ── Summary bar ─────────────────────────────────────────── */
    .summary-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.65rem 1rem;
      display: flex;
      gap: 1.75rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .summary-item {
      display: flex;
      align-items: baseline;
      gap: 0.45rem;
      font-size: 11px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .summary-item strong {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: none;
      line-height: 1;
    }

    .summary-item.s-total strong { color: var(--text); }
    .summary-item.s-great strong { color: var(--great); }
    .summary-item.s-good  strong { color: var(--good); }

    /* ── Cards grid ──────────────────────────────────────────── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: var(--gap);
    }

    /* ── Deal card ───────────────────────────────────────────── */
    .deal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .deal-card:hover { border-color: var(--border-2); }

    .deal-card.tier-great {
      border-color: var(--great-border);
      background: var(--great-bg);
      box-shadow: 0 0 0 1px var(--great-glow) inset;
    }
    .deal-card.tier-great:hover { border-color: var(--great); }

    .deal-card.tier-good  { border-color: var(--good-border); }
    .deal-card.tier-good:hover { border-color: var(--good); }

    .deal-card.tier-fair  { opacity: 0.55; }
    .deal-card.tier-fair:hover  { opacity: 0.85; }

    .deal-card.tier-unfair { border-color: var(--unfair-border); }

    /* Card: top section (image + title block) */
    .card-top {
      display: flex;
    }

    .card-thumb {
      width: 96px;
      min-height: 80px;
      flex-shrink: 0;
      background: var(--surface-2);
      overflow: hidden;
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-meta {
      flex: 1;
      padding: 0.65rem 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      border-bottom: 1px solid var(--border);
      min-width: 0;
    }

    .card-badges {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
    }

    /* Tier badge */
    .badge-tier {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.12rem 0.45rem;
      border-radius: var(--r);
    }

    .badge-tier.great { background: var(--great);  color: #000; }
    .badge-tier.good  { background: var(--good);   color: #000; }
    .badge-tier.fair  {
      background: var(--surface-3);
      color: var(--fair);
      border: 1px solid var(--fair-border);
    }
    .badge-tier.unfair {
      background: var(--unfair-bg);
      color: var(--unfair);
      border: 1px solid var(--unfair-border);
    }

    /* Status badge */
    .badge-status {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.12rem 0.45rem;
      border-radius: var(--r);
    }

    .badge-status.broken  {
      background: rgba(245,158,11,0.12);
      color: var(--broken);
      border: 1px solid rgba(245,158,11,0.28);
    }
    .badge-status.working {
      background: rgba(16,185,129,0.1);
      color: var(--working);
      border: 1px solid rgba(16,185,129,0.25);
    }

    .card-model {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .card-title {
      font-size: 11.5px;
      color: var(--text);
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Card: stats row */
    .card-stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }

    .stat-cell {
      background: var(--surface);
      padding: 0.55rem 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.18rem;
    }

    .tier-great .stat-cell { background: var(--great-bg); }

    .stat-label {
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .stat-value {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .stat-value.pos { color: var(--profit-pos); }
    .stat-value.neg { color: var(--profit-neg); }

    /* Card: footer */
    .card-footer {
      padding: 0.55rem 0.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .card-date {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }

    .btn-view {
      display: inline-block;
      background: transparent;
      border: 1px solid var(--border-2);
      color: var(--text-muted);
      font-family: inherit;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.3rem 0.7rem;
      border-radius: var(--r);
      transition: all 0.12s;
      white-space: nowrap;
      cursor: pointer;
    }

    .btn-view:hover {
      background: var(--text);
      border-color: var(--text);
      color: var(--bg);
    }

    .tier-great .btn-view:hover {
      background: var(--great);
      border-color: var(--great);
      color: #000;
    }

    .tier-good .btn-view:hover {
      background: var(--good);
      border-color: var(--good);
      color: #000;
    }

    /* ── Unfair section ──────────────────────────────────────── */
    .unfair-section {
      margin-top: 1.5rem;
    }

    .btn-unfair-toggle {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--unfair-border);
      color: var(--unfair);
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      padding: 0.65rem 1rem;
      cursor: pointer;
      border-radius: var(--r);
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.12s;
    }

    .btn-unfair-toggle:hover { background: var(--unfair-bg); }

    .toggle-arrow {
      display: inline-block;
      transition: transform 0.2s ease;
    }

    .btn-unfair-toggle.open .toggle-arrow {
      transform: rotate(180deg);
    }

    .unfair-grid {
      display: none;
      margin-top: var(--gap);
    }

    .unfair-grid.open {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: var(--gap);
    }

    /* ── State messages ──────────────────────────────────────── */
    .state-msg {
      padding: 3rem 1rem;
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      grid-column: 1 / -1;
    }

    .state-msg.error { color: var(--unfair); }

    .no-results {
      grid-column: 1 / -1;
      padding: 2.5rem 1rem;
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 600px) {
      .site-header { flex-direction: column; align-items: flex-start; gap: 0.35rem; }
      .main { padding: 1rem; }
      .cards-grid, .unfair-grid.open { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="site-title">eBay Flip<span class="slash"> / </span>Finder</div>
  <div class="last-refreshed">Refreshed: <strong id="js-refreshed">—</strong></div>
</header>

<main class="main">

  <div class="filter-bar" id="js-filter-bar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="PS4 DualShock 4">PS4 DualShock 4</button>
    <button class="filter-btn" data-filter="Xbox One/Series">Xbox One/Series</button>
    <button class="filter-btn" data-filter="Joy-Con">Joy-Con</button>
  </div>

  <div class="summary-bar">
    <div class="summary-item s-total"><strong id="js-count-total">—</strong> deals found</div>
    <div class="summary-item s-great"><strong id="js-count-great">—</strong> ⭐ great</div>
    <div class="summary-item s-good"><strong id="js-count-good">—</strong>  🟢 good</div>
  </div>

  <div id="js-main-grid" class="cards-grid">
    <div class="state-msg">Loading deals…</div>
  </div>

  <div class="unfair-section" id="js-unfair-section" hidden>
    <button class="btn-unfair-toggle" id="js-unfair-toggle">
      <span id="js-unfair-label">Show 0 unfair deals</span>
      <span class="toggle-arrow">▼</span>
    </button>
    <div class="unfair-grid" id="js-unfair-grid"></div>
  </div>

</main>

<script>
(function () {
  'use strict';

  const TIER_ORDER = { great: 0, good: 1, fair: 2, unfair: 3 };

  const TIER_LABELS = {
    great:  '⭐ GREAT',
    good:   '🟢 GOOD',
    fair:   '🟡 FAIR',
    unfair: '🔴 UNFAIR',
  };

  let allDeals = [];
  let activeFilter = 'all';

  // ── Utilities ──────────────────────────────────────────────

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function fmtMoney(v) {
    const n = Number(v);
    return (n < 0 ? '-$' : '$') + Math.abs(n).toFixed(2);
  }

  function fmtProfit(v) {
    const n = Number(v);
    return (n >= 0 ? '+$' : '-$') + Math.abs(n).toFixed(2);
  }

  function fmtDate(iso) {
    const d = new Date(iso.includes('T') ? iso : iso + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  // ── Card builder ───────────────────────────────────────────

  function buildCard(deal) {
    const div = document.createElement('div');
    div.className = 'deal-card tier-' + deal.deal_tier;

    const profitVal = Number(deal.profit_estimate);
    const profitClass = profitVal >= 0 ? 'pos' : 'neg';

    div.innerHTML =
      '<div class="card-top">' +
        '<div class="card-thumb">' +
          '<img src="' + esc(deal.image_url) + '" alt="' + esc(deal.model) + '" loading="lazy" ' +
               'onerror="this.parentNode.style.background=\'#1a1a1e\'">' +
        '</div>' +
        '<div class="card-meta">' +
          '<div class="card-badges">' +
            '<span class="badge-tier ' + esc(deal.deal_tier) + '">' + (TIER_LABELS[deal.deal_tier] || esc(deal.deal_tier)) + '</span>' +
            '<span class="badge-status ' + esc(deal.status) + '">' + esc(deal.status).toUpperCase() + '</span>' +
          '</div>' +
          '<div class="card-model">' + esc(deal.model) + '</div>' +
          '<div class="card-title">' + esc(deal.title) + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="card-stats">' +
        '<div class="stat-cell"><div class="stat-label">Buy Price</div><div class="stat-value">' + fmtMoney(deal.buy_price) + '</div></div>' +
        '<div class="stat-cell"><div class="stat-label">Market</div><div class="stat-value">' + fmtMoney(deal.market_price) + '</div></div>' +
        '<div class="stat-cell"><div class="stat-label">Est. Profit</div><div class="stat-value ' + profitClass + '">' + fmtProfit(deal.profit_estimate) + '</div></div>' +
      '</div>' +
      '<div class="card-footer">' +
        '<div class="card-date">Posted ' + fmtDate(deal.date_posted) + '</div>' +
        '<a class="btn-view" href="' + esc(deal.listing_url) + '" target="_blank" rel="noopener noreferrer">View on eBay →</a>' +
      '</div>';

    return div;
  }

  // ── Filter logic ───────────────────────────────────────────

  function matchesFilter(deal) {
    if (activeFilter === 'all') return true;
    if (activeFilter === 'Joy-Con') return deal.model.includes('Joy-Con') || deal.model.includes('Joy Con');
    if (activeFilter === 'Xbox One/Series') return deal.model.includes('Xbox');
    if (activeFilter === 'PS4 DualShock 4') return deal.model.includes('PS4') || deal.model.includes('DualShock');
    return deal.model === activeFilter;
  }

  // ── Render ─────────────────────────────────────────────────

  function render() {
    const filtered = allDeals.filter(matchesFilter);
    const sorted   = filtered.slice().sort(function (a, b) {
      return (TIER_ORDER[a.deal_tier] || 0) - (TIER_ORDER[b.deal_tier] || 0);
    });

    const mainDeals   = sorted.filter(function (d) { return d.deal_tier !== 'unfair'; });
    const unfairDeals = sorted.filter(function (d) { return d.deal_tier === 'unfair'; });

    // Main grid
    var mainGrid = document.getElementById('js-main-grid');
    mainGrid.innerHTML = '';
    if (mainDeals.length === 0) {
      mainGrid.innerHTML = '<div class="no-results">No deals match this filter.</div>';
    } else {
      mainDeals.forEach(function (d) { mainGrid.appendChild(buildCard(d)); });
    }

    // Unfair section
    var unfairSection = document.getElementById('js-unfair-section');
    var unfairGrid    = document.getElementById('js-unfair-grid');
    var unfairLabel   = document.getElementById('js-unfair-label');
    var unfairToggle  = document.getElementById('js-unfair-toggle');

    if (unfairDeals.length > 0) {
      unfairSection.hidden = false;
      var n = unfairDeals.length;
      var noun = n === 1 ? 'deal' : 'deals';

      // Preserve open/closed state across re-renders
      var isOpen = unfairGrid.classList.contains('open');
      unfairGrid.innerHTML = '';
      unfairDeals.forEach(function (d) { unfairGrid.appendChild(buildCard(d)); });
      unfairLabel.textContent = isOpen
        ? 'Hide ' + n + ' unfair ' + noun
        : 'Show ' + n + ' unfair ' + noun;
    } else {
      unfairSection.hidden = true;
      unfairGrid.innerHTML = '';
      unfairGrid.classList.remove('open');
      unfairToggle.classList.remove('open');
    }

    // Summary
    var greatN = filtered.filter(function (d) { return d.deal_tier === 'great'; }).length;
    var goodN  = filtered.filter(function (d) { return d.deal_tier === 'good';  }).length;
    document.getElementById('js-count-total').textContent = filtered.length;
    document.getElementById('js-count-great').textContent = greatN;
    document.getElementById('js-count-good').textContent  = goodN;
  }

  // ── Filter button events ────────────────────────────────────

  document.getElementById('js-filter-bar').addEventListener('click', function (e) {
    var btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(function (b) { b.classList.remove('active'); });
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });

  // ── Unfair toggle ───────────────────────────────────────────

  document.getElementById('js-unfair-toggle').addEventListener('click', function () {
    var grid   = document.getElementById('js-unfair-grid');
    var toggle = document.getElementById('js-unfair-toggle');
    var label  = document.getElementById('js-unfair-label');
    var isOpen = grid.classList.contains('open');
    grid.classList.toggle('open', !isOpen);
    toggle.classList.toggle('open', !isOpen);
    var n    = grid.children.length;
    var noun = n === 1 ? 'deal' : 'deals';
    label.textContent = isOpen ? 'Show ' + n + ' unfair ' + noun : 'Hide ' + n + ' unfair ' + noun;
  });

  // ── Data load ───────────────────────────────────────────────

  fetch('data/deals.json')
    .then(function (res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function (payload) {
      // Support both wrapped { refreshed_at, deals } and bare array formats
      allDeals = Array.isArray(payload) ? payload : (payload.deals || []);

      var refreshedEl = document.getElementById('js-refreshed');
      var ts = Array.isArray(payload) ? null : payload.refreshed_at;
      if (ts) {
        refreshedEl.textContent = fmtDate(ts) + ' ' +
          new Date(ts).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', timeZoneName: 'short' });
      } else {
        var dates = allDeals.map(function (d) { return d.date_posted; }).filter(Boolean).sort().reverse();
        refreshedEl.textContent = dates.length ? fmtDate(dates[0]) : 'Unknown';
      }

      render();
    })
    .catch(function (err) {
      document.getElementById('js-main-grid').innerHTML =
        '<div class="state-msg error">Failed to load deals.json — ' + esc(err.message) + '</div>';
    });
}());
</script>
</body>
</html>
